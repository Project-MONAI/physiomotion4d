# Pre-commit configuration for PhysioTwin4D
# Simplified to use Ruff for all linting and formatting

repos:
  # Ruff - fast linter and formatter (replaces black, isort, flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      # Run the linter with auto-fixes
      - id: ruff-check
        args: [--fix]
      # Run the formatter
      - id: ruff-format

  # Type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        # Pass only the staged files pre-commit selects (via the files regex);
        # do not scan whole src/ and tutorials/ trees, which would include
        # untracked files.
        args: [--config-file=pyproject.toml]
        additional_dependencies:
          - types-setuptools
          - scipy-stubs
          - types-requests
        files: ^(src/|tutorials/)

  # Regenerate docs/API_MAP.md whenever Python source files change
  - repo: local
    hooks:
      - id: generate-api-map
        name: Regenerate API map (docs/API_MAP.md)
        entry: py utils/generate_api_map.py
        language: system
        pass_filenames: false
        files: \.py$

  # Local tests (optional - can be disabled if too slow)
  - repo: local
    hooks:
      - id: fast-unit-tests
        name: Run Fast Unit Tests
        entry: pytest tests/ -m "not slow" -v --maxfail=3
        language: system
        pass_filenames: false
        always_run: false
        files: ^(src/physiotwin4d/|tests/)
        stages: [pre-push]
