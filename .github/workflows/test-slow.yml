name: Slow Tests

# DISABLED: This workflow requires a self-hosted GPU runner to be available.
# Currently disabled because no GPU-enabled runners are available.
# Can be manually triggered via workflow_dispatch if a GPU runner becomes available.

on:
  workflow_dispatch:

jobs:
  test-slow-gpu:
    name: Slow Tests on GPU
    runs-on: [self-hosted, linux, gpu, cuda13]
    timeout-minutes: 60
    continue-on-error: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Check GPU availability
      run: |
        nvidia-smi
        python -c "import torch; print(f'PyTorch CUDA available: {torch.cuda.is_available()}')" || echo "PyTorch not installed yet"

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-slow-gpu-${{ hashFiles('pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-slow-gpu-
          ${{ runner.os }}-pip-gpu-
          ${{ runner.os }}-pip-

    - name: Cache test data
      uses: actions/cache@v4
      with:
        path: |
          tests/data/
          tests/results/
        key: test-data-${{ hashFiles('tests/test_*.py') }}-v2
        restore-keys: |
          test-data-

    - name: Upgrade pip and build tools
      run: |
        python -m pip install --upgrade pip setuptools wheel uv

    - name: Install package with test dependencies
      # uv respects [tool.uv.sources], routing torch to pytorch-cu130 for cuda13
      run: |
        uv pip install --system -e ".[test,cuda13]"

    - name: Run slow tests
      run: |
        pytest tests/ -v -m "slow and not experiment" --cov=physiomotion4d --cov-report=xml --cov-report=term
      env:
        CUDA_VISIBLE_DEVICES: 0

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: slow-tests-gpu
        name: codecov-slow-gpu
        fail_ci_if_error: false

